version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: entropy
      POSTGRES_USER: entropy_user
      POSTGRES_PASSWORD: entropy_pass
    volumes:
      - entropy_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entropy_user -d entropy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - entropy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/entropy_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - entropy_neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "entropy_neo4j", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── AI Backend ──────────────────────────────────────────────────────────────
  ai-agent:
    env_file: ./.env
    build:
      context: ./apps/ai-agent
      dockerfile: Dockerfile
    volumes:
      - ./apps/ai-agent:/app
      - ai_agent_data:/app/data
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-1.5-flash-latest}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - DATABASE_URL=postgresql://entropy_user:entropy_pass@postgres:5432/entropy
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=entropy_neo4j
      - REDIS_URL=redis://redis:6379
      - AI_BACKEND_TOKEN=${NEXT_PUBLIC_AI_BACKEND_TOKEN}
      - DEBUG=true
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5000
      - UPLOAD_DIR=/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  nextjs:
    env_file: ./.env
    build:
      context: ./apps/app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://entropy_user:entropy_pass@postgres:5432/entropy
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITHUB_ID=${GITHUB_CLIENT_ID}
      - GITHUB_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AI_AGENT_BACKEND_URL=http://ai-agent:8000
      - NEXT_PUBLIC_AI_BACKEND_TOKEN=${NEXT_PUBLIC_AI_BACKEND_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
    restart: unless-stopped

volumes:
  entropy_db_data:
  entropy_redis_data:
  entropy_neo4j_data:
  ai_agent_data:
