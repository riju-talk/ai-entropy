version: 1
applications:
  - appRoot: apps/app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - npm install --legacy-peer-deps
            - npx prisma generate
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*