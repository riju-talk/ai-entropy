version: 1
applications:
  - appRoot: apps/app
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - npm install --legacy-peer-deps

            # expose env vars to Next runtime
            - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
            - echo "DIRECT_URL=$DIRECT_URL" >> .env.production
            - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
            - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
            - echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env.production
            - echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env.production
            - echo "GITHUB_ID=$GITHUB_ID" >> .env.production
            - echo "GITHUB_SECRET=$GITHUB_SECRET" >> .env.production
            - echo "BACKEND_URL=$BACKEND_URL" >> .env.production
            - echo "JWT_SECRET=$JWT_SECRET" >> .env.production
            - echo "JWT_ALGORITHM=$JWT_ALGORITHM" >> .env.production
            # prisma setup
            - npx prisma db pull --schema=prisma/schema.prisma
            - npx prisma generate --schema=prisma/schema.prisma

        build:
          commands:
            - npm run build

      artifacts:
        baseDirectory: .next
        files:
          - '**/*'

      cache:
        paths:
          - node_modules/**/*