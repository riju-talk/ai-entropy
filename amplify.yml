version: 1
applications:
  - appRoot: apps/app

    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - npm install -g pnpm
            - pnpm install --frozen-lockfile

        build:
          commands:
            - pnpm turbo run build --filter=app...

      artifacts:
        baseDirectory: apps/app/.next
        files:
          - '**/*'

      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
          - apps/app/node_modules/**/*