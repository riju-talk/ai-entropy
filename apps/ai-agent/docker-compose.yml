# Data-only compose — run the Next.js app and FastAPI locally (npm run dev / uvicorn).
# Only the three persistent data stores are containerised.
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: entropy
      POSTGRES_USER: entropy_user
      POSTGRES_PASSWORD: entropy_pass
    ports:
      - "5432:5432"
    volumes:
      - entropy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entropy_user -d entropy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: neo4j/entropy_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - entropy-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p entropy_neo4j 'RETURN 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - entropy-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  entropy-db-data:
  entropy-neo4j-data:
  entropy-redis-data:
