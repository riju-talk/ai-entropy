service: entropy-ai-engine

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.11
  stage: dev
  region: ap-northeast-1
  memorySize: 1024
  timeout: 30
  architecture: x86_64

  environment:
    APP_ENV: dev
    AI_PROVIDER: bedrock
    BEDROCK_CLAUDE_MODEL: anthropic.claude-3-sonnet-20240229-v1:0
    BEDROCK_TITAN_EMBED: amazon.titan-embed-text-v2:0
    AWS_REGION: ap-northeast-1
    DATABASE_URL: ${ssm:/entropy/dev/DATABASE_URL}
    S3_BUCKET_NAME: entropy-documents-dev
    AI_BACKEND_TOKEN: ${ssm:/entropy/dev/AI_BACKEND_TOKEN}
    NEO4J_URI: ${ssm:/entropy/dev/NEO4J_URI}
    NEO4J_USER: ${ssm:/entropy/dev/NEO4J_USER}
    NEO4J_PASSWORD: ${ssm:/entropy/dev/NEO4J_PASSWORD}
    REDIS_HOST: ${ssm:/entropy/dev/REDIS_HOST}
    REDIS_PORT: ${ssm:/entropy/dev/REDIS_PORT}
    JWT_SECRET_KEY: ${ssm:/entropy/dev/JWT_SECRET_KEY}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource:
            - arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0
            - arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.titan-embed-text-v2:0
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:HeadObject
          Resource:
            - arn:aws:s3:::entropy-documents-dev/*

functions:
  api:
    handler: lambda_handler.handler
    events:
      - http:
          path: /{proxy+}
          method: any
          cors: true

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
    strip: false
